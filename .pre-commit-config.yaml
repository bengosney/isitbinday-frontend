# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: 'migrations/.*\.py|Procfile|[aw]sgi\.py|node_modules|.git|\.polar'
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix, lf]
  # - repo: https://github.com/pre-commit/mirrors-eslint
  #   rev: 'v8.20.0'
  #   hooks:
  #     - id: eslint
  #       files: \.[jt]sx?$
  #       types: [file]
  #       additional_dependencies:
  #         - '@eslint/js'
  #         - 'eslint'
  #         - 'eslint-plugin-react'
  #         - 'eslint-plugin-unused-imports'
  #         - 'globals'
  #       args:
  #         - '--fix'
  #         - '--quiet'
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        description: Format files with the project's own prettier
        entry: pnpm exec prettier --write --ignore-unknown
        language: system
        types: [text]
        files: \.(ts|tsx|js|jsx|json|css|scss|md|ya?ml)$
        exclude: pnpm-lock\.yaml$
      - id: tofu-fmt
        name: tofu format
        description: Format .tf files
        entry: tofu fmt
        language: system
        files: .tf$
